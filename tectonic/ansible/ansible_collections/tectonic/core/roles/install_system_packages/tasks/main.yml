---
- name: Update Linux package manager cache 
  block: 
    - name: Update package manager cache (Debian)
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_facts.os_family == "Debian"
    - name: Update package manager cache (RedHat/Fedora)
      ansible.builtin.dnf:
        update_cache: yes
      when: ansible_facts.os_family in ["RedHat", "Fedora"]

- name: Install Linux system packages
  ansible.builtin.package:
    name: "{{ packages_to_install }}"
    state: present
  when: packages_to_install | length > 0