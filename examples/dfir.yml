---
# ==============================================================================
# DFIR Final Scenario - Lab Edition Configuration
# ==============================================================================
# This file defines a specific deployment of the unified attack scenario.
# It combines network traffic simulation with filesystem forensics.
#
# USAGE:
#   tectonic -c tectonic.ini examples/dfir_final_scenario/edition.yml create-images
#   tectonic -c tectonic.ini examples/dfir_final_scenario/edition.yml deploy
# ==============================================================================

base_lab: dfir_final_scenario
institution: udelar
lab_edition_name: dfir
instance_number: 1
student_prefix: student
create_students_passwords: true
teacher_pubkey_dir: teacher_pubkeys/
student_pubkey_dir: student_pubkeys/
random_seed: 378374hdf9udf

# ==============================================================================
# DEPLOYMENT NOTES
# ==============================================================================
# 
# PRE-DEPLOYMENT CHECKLIST:
#   1. Verify tectonic.ini is configured for your platform (libvirt/aws/docker)
#   2. Ensure base images exist or will be created
#   3. Check available resources (CPU, memory, disk)
#   4. Prepare SSH keys if using teacher/student key directories
#
# DEPLOYMENT COMMANDS:
#   
#   # Step 1: Create base images (one-time or when base_config.yml changes)
#   tectonic -c tectonic.ini examples/dfir_final_scenario/edition.yml create-images
#   
#   # Step 2: Deploy instances
#   tectonic -c tectonic.ini examples/dfir_final_scenario/edition.yml deploy
#   
#   # Step 3: Access instances
#   tectonic -c tectonic.ini examples/dfir_final_scenario/edition.yml show-info
#   
#   # Step 4: Connect via SSH (get connection details from show-info)
#   ssh -i ~/.ssh/id_rsa ubuntu@<victim-ip>
#
# ANALYSIS OUTPUTS:
#   - Network traffic: /tmp/wannacry_unified_attack.pcap (on victim)
#   - Forensic disk image: /tmp/final_forensic.img (on victim)
#   - Encrypted files: Inside disk image at /srv/samba/share
#   - Hidden flag: flagsinha.txt.WNCRY (deleted, recoverable with Autopsy)
#
# CLEANUP:
#   tectonic -c tectonic.ini examples/dfir_final_scenario/edition.yml destroy
#
# ==============================================================================
